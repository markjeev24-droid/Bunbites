<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BunBites 🍩</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff6b6b; --dark: #1a1a1a; --bg: #f8f9fa; }
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 600; color: #444; margin-bottom: 8px; }
        input { width: 100%; padding: 14px; border: 1px solid #e1e4e8; border-radius: 12px; box-sizing: border-box; outline: none; }
        .btn-login { background: var(--dark); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .btn-login:disabled { background: #666; cursor: not-allowed; }
        #error-msg { color: #ff6b6b; font-size: 13px; margin-bottom: 15px; display: none; background: #fff5f5; padding: 10px; border-radius: 10px; border: 1px solid #ffcccc; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div style="font-size: 40px;">🍩</div>
        <h2>Welcome Back</h2>
        <p>Login to your BunBites account</p>
        <div id="error-msg"></div>
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="juan@example.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button class="btn-login" id="login-btn" onclick="handleLogin()">Sign In</button>
        <div style="margin-top:20px; font-size:14px;">
            Don't have an account? <a href="signup.html" style="color:var(--primary); font-weight:bold; text-decoration:none;">Create one</a>
        </div>
    </div>

    <script type="module">
        import { auth, db } from '../assets/firebase.js'; 
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        window.handleLogin = async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('error-msg');
            const btn = document.getElementById('login-btn');

            if(!email || !password) return alert("Please fill in all fields.");

            // UI Feedback
            btn.disabled = true;
            btn.innerText = "Signing in...";
            errorBox.style.display = "none";

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const userDoc = await getDoc(doc(db, "users", userCredential.user.uid));
                
                // Redirects to public/index.html for both roles
                window.location.href = "../index.html";

            } catch (error) {
                // Friendly error mapping for common login issues
                let friendlyMsg = "Login failed. Please try again.";
                
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                    friendlyMsg = "Incorrect email or password. Please try again.";
                } else if (error.code === 'auth/too-many-requests') {
                    friendlyMsg = "Too many failed attempts. Please try again in a few minutes.";
                } else if (error.code === 'auth/network-request-failed') {
                    friendlyMsg = "Connection error. Please check your internet.";
                }

                console.error("Auth Error:", error.code);
                errorBox.innerText = friendlyMsg;
                errorBox.style.display = "block";
                btn.disabled = false;
                btn.innerText = "Sign In";
            }
        };
    </script>
</body>
</html>
