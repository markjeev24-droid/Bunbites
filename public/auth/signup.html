<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | BunBites 🍩</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff6b6b; --dark: #1a1a1a; }
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .input-group { text-align: left; margin-bottom: 12px; }
        label { display: block; font-size: 12px; font-weight: 600; color: #444; margin-bottom: 8px; }
        input { width: 100%; padding: 14px; border: 1px solid #e1e4e8; border-radius: 12px; box-sizing: border-box; outline: none; }
        .btn-signup { background: var(--primary); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .btn-signup:disabled { background: #ccc; cursor: not-allowed; }
        #error-msg { color: #ff6b6b; font-size: 13px; margin-bottom: 15px; display: none; background: #fff5f5; padding: 10px; border-radius: 10px; border: 1px solid #ffcccc; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div style="font-size: 40px;">🍩</div>
        <h2>Fresh Start</h2>
        <p>Join BunBites today!</p>
        <div id="error-msg"></div>
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Juan Dela Cruz">
        </div>
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="juan@example.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Min. 6 characters">
        </div>
        <button class="btn-signup" id="signup-btn" onclick="handleSignup()">Create Account</button>
        <div style="margin-top:20px; font-size:14px;">
            Already a member? <a href="login.html" style="color:var(--dark); font-weight:bold; text-decoration:none;">Sign In</a>
        </div>
    </div>

    <script type="module">
        import { auth, db } from '../assets/firebase.js'; 
        import { createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        window.handleSignup = async () => {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('error-msg');
            const btn = document.getElementById('signup-btn');

            if(!name || !email || !password) return alert("Please fill in all fields.");

            // UI Feedback
            btn.disabled = true;
            btn.innerText = "Creating Account...";
            errorBox.style.display = "none";

            try {
                // 1. Create the user in Firebase Auth
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                
                // 2. Set the display name profile
                await updateProfile(userCred.user, { displayName: name });
                
                // 3. Save the custom details to Firestore
                // We add isNewUser: true so the index page knows to show the Welcome Popup
                await setDoc(doc(db, "users", userCred.user.uid), {
                    fullName: name,
                    email: email,
                    role: "customer",
                    isNewUser: true, 
                    createdAt: serverTimestamp()
                });

                alert("Account created successfully! 🎉");
                window.location.href = "../index.html";

            } catch (error) {
                // Simple error language for users
                let friendlyMsg = "Registration failed. Please try again.";
                
                if (error.code === 'auth/email-already-in-use') {
                    friendlyMsg = "This email is already registered. Try signing in instead!";
                } else if (error.code === 'auth/invalid-email') {
                    friendlyMsg = "Please enter a valid email address.";
                } else if (error.code === 'auth/weak-password') {
                    friendlyMsg = "Password is too weak. Please use at least 6 characters.";
                } else if (error.code === 'auth/network-request-failed') {
                    friendlyMsg = "Connection error. Please check your internet.";
                }

                console.error("Signup error code:", error.code);
                errorBox.innerText = friendlyMsg;
                errorBox.style.display = "block";
                btn.disabled = false;
                btn.innerText = "Create Account";
            }
        };
    </script>
</body>
</html>
