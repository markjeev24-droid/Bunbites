<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Donuts 🍩 | BunBites</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { 
            --primary: #ff6b6b; --dark: #1a1a1a; --bg: #f8f9fa; 
            --pending: #ff6b6b; --prep: #3498db; --delivery: #f39c12; --done: #2ecc71;
        }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--dark); }
        
        .track-container { max-width: 500px; margin: 0 auto; background: white; border-radius: 30px; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.08); position: relative; min-height: 650px; }
        
        #success-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 1000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 40px; box-sizing: border-box;
            animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .check-icon { font-size: 80px; margin-bottom: 10px; }
        .rating-group { display: flex; gap: 10px; margin: 20px 0; font-size: 38px; cursor: pointer; }
        .star { color: #eee; transition: 0.3s; text-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .star.active { color: #f1c40f; transform: scale(1.2); }

        .review-box { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #eee; font-family: inherit; resize: none; margin-bottom: 20px; box-sizing: border-box; background: #fafafa; }

        .btn-action { background: var(--primary); color: white; padding: 15px 35px; border-radius: 50px; text-decoration: none; font-weight: 800; border: none; cursor: pointer; display: inline-block; width: 100%; transition: 0.3s; text-align: center;}
        .btn-action:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-secondary { background: #f0f0f0; color: #555; margin-top: 10px; border-radius: 50px; }

        .status-header { padding: 40px 20px 20px; text-align: center; }
        .progress-track { background: #eee; height: 12px; border-radius: 10px; margin: 25px auto; width: 85%; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; width: 15%; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px rgba(255,107,107,0.4); }
        
        #track-map { width: 100%; height: 280px; background: #e5e5e5; }
        
        .order-info-card { padding: 30px; border-top: 1px solid #f1f1f1; }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 15px; }
        .label { color: #999; font-weight: 500; }
        .value { font-weight: 600; }
    </style>
</head>
<body>

    <div class="track-container">
        <div id="success-overlay">
            <div class="check-icon">🍩</div>
            <h2 style="margin:0; font-weight: 800;">Freshly Delivered!</h2>
            <p style="color:#777; font-size: 14px; margin-bottom: 20px;">Your BunBites have arrived. We'd love to hear your thoughts!</p>
            
            <div class="rating-group" id="star-rating">
                <span class="star" data-value="1">★</span>
                <span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span>
                <span class="star" data-value="4">★</span>
                <span class="star" data-value="5">★</span>
            </div>

            <textarea id="review-text" class="review-box" placeholder="Tell us about the taste or service..." rows="3"></textarea>
            
            <button id="submit-feedback-btn" class="btn-action">Submit Review</button>
            <div id="thank-you-msg" style="display:none; color: var(--done); font-weight: 700; margin: 20px 0;">Review received! Thank you! ❤️</div>

            <a href="index.html" class="btn-action btn-secondary">Order More Donuts</a>
        </div>

        <div id="tracking-content">
            <div class="status-header">
                <div id="status-text" style="font-weight:800; color:var(--primary); font-size: 24px; letter-spacing: -0.5px;">LOCATING...</div>
                <div class="progress-track">
                    <div id="progress-bar" class="progress-fill" style="background:var(--primary);"></div>
                </div>
                <div id="status-desc" style="font-size: 14px; color: #888;">Connecting to the kitchen...</div>
            </div>

            <div id="track-map"></div>

            <div class="order-info-card">
                <div class="detail-row">
                    <span class="label">Order ID</span>
                    <span class="value" id="order-id-val">#------</span>
                </div>
                <div class="detail-row">
                    <span class="label">Recipient</span>
                    <span class="value" id="order-name">Guest</span>
                </div>
                <div class="detail-row">
                    <span class="label">Total Amount</span>
                    <span class="value" id="order-total" style="color:var(--primary);">₱0.00</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from '../assets/firebase.js';
        import { doc, onSnapshot, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('id');
        let selectedRating = 0;
        let mapInitialized = false;
        let customerName = "Guest";
        let currentMap, currentMarker;

        // --- 1. RATING LOGIC ---
        const stars = document.querySelectorAll('.star');
        stars.forEach(star => {
            star.onclick = () => {
                selectedRating = parseInt(star.getAttribute('data-value'));
                stars.forEach((s, i) => s.classList.toggle('active', i < selectedRating));
            };
        });

        document.getElementById('submit-feedback-btn').onclick = async () => {
            if(selectedRating === 0) return alert("Please pick a star rating!");
            const btn = document.getElementById('submit-feedback-btn');
            btn.disabled = true; btn.innerText = "Sending...";

            try {
                await setDoc(doc(db, "reviews", orderId), {
                    orderId: orderId,
                    rating: selectedRating,
                    comment: document.getElementById('review-text').value,
                    customerName: customerName,
                    createdAt: serverTimestamp()
                });
                
                btn.style.display = 'none';
                document.getElementById('review-text').style.display = 'none';
                document.getElementById('thank-you-msg').style.display = 'block';
                localStorage.removeItem('last_bunbites_order'); // Clean up bubble
            } catch(e) { 
                alert("Failed to send review."); 
                btn.disabled = false; btn.innerText = "Submit Review";
            }
        };

        // --- 2. TRACKING ENGINE ---
        if (!orderId) {
            window.location.href = 'index.html';
        } else {
            // We listen to the ACTIVE orders collection
            const orderRef = doc(db, "orders", orderId);
            onSnapshot(orderRef, (snap) => {
                if (snap.exists()) {
                    processData(snap.data());
                } else {
                    // If order is gone from "orders", check "sales_history" (Completed)
                    getDoc(doc(db, "sales_history", orderId)).then(hSnap => {
                        if(hSnap.exists()) {
                            processData(hSnap.data(), true);
                        } else {
                            document.getElementById('status-text').innerText = "EXPIRED";
                            document.getElementById('status-desc').innerText = "Order record not found.";
                        }
                    });
                }
            });
        }

        function processData(data, isCompleted = false) {
            customerName = data.customerName || "Guest";
            document.getElementById('order-id-val').innerText = `#${orderId.slice(-6).toUpperCase()}`;
            document.getElementById('order-name').innerText = customerName;
            document.getElementById('order-total').innerText = `₱${Number(data.totalPrice || data.total || 0).toLocaleString()}`;

            const bar = document.getElementById('progress-bar');
            const desc = document.getElementById('status-desc');
            const status = (data.status || "Pending").toLowerCase();

            // Status Logic
            if (status.includes("prep")) {
                bar.style.width = "50%";
                desc.innerText = "Our team is preparing your fresh BunBites! 🍩";
            } else if (status.includes("deliv") || status.includes("out")) {
                bar.style.width = "85%";
                desc.innerText = "Order is out for delivery! Get ready! 🛵";
            } else if (isCompleted || status.includes("done")) {
                bar.style.width = "100%";
                desc.innerText = "Arrived! Enjoy your donuts! ✅";
                triggerSuccess();
            } else {
                bar.style.width = "15%";
                desc.innerText = "Waiting for the kitchen to accept... ⏳";
            }

            document.getElementById('status-text').innerText = status.toUpperCase();

            // Map Update
            const coords = data.coords || {};
            if (coords.lat && coords.lng) {
                const pos = [parseFloat(coords.lat), parseFloat(coords.lng)];
                if (!mapInitialized) {
                    currentMap = L.map('track-map', { zoomControl: false }).setView(pos, 16);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(currentMap);
                    currentMarker = L.marker(pos).addTo(currentMap);
                    mapInitialized = true;
                } else {
                    currentMarker.setLatLng(pos);
                    currentMap.panTo(pos);
                }
            }
        }

        function triggerSuccess() {
            setTimeout(() => {
                document.getElementById('success-overlay').style.display = 'flex';
            }, 1500);
        }
    </script>
</body>
</html>
